name: Code Quality Checks

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/code-quality.yml'

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-quality:
    name: Python Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run Black (code formatting check)
        run: |
          cd api
          python -m black --check --diff .

      - name: Run isort (import sorting check)
        run: |
          cd api
          python -m isort --check-only --diff .

      - name: Run Flake8 (linting)
        run: |
          cd api
          python -m flake8 .

      - name: Run MyPy (type checking)
        run: |
          cd api
          python -m mypy --ignore-missing-imports app.py

      - name: Run Bandit (security check)
        run: |
          cd api
          python -m bandit -r . -f json -o bandit-report.json || true
          python -m bandit -r . -ll

      - name: Run Safety (dependency security check)
        run: |
          cd api
          # Scan only project dependency files, not the full runner environment.
          python -m safety check \
            -r requirements.txt \
            -r requirements-dev.txt \
            --ignore 77744 --ignore 77745 --ignore 78688 --ignore 78279 --ignore 78558 --ignore 59234 --ignore 77942 --ignore 78057 --ignore 72086

      - name: Run Tests
        run: |
          cd api
          python -m pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./api/coverage.xml
          flags: python
          name: codecov-python
          fail_ci_if_error: false

  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint (JavaScript linting)
        run: |
          cd frontend
          npm run lint

      - name: Run Prettier (code formatting check)
        run: |
          cd frontend
          npm run format:check

      - name: Run HTML validation
        run: |
          cd frontend
          npm run validate:html

      - name: Run Stylelint (CSS linting)
        run: |
          cd frontend
          npx stylelint "html/**/*.css"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  docker-quality:
    name: Docker Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile linting)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
          format: sarif
          output-file: hadolint-api.sarif
          no-fail: true

      - name: Run Hadolint (Frontend Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          format: sarif
          output-file: hadolint-frontend.sarif
          no-fail: true

      - name: Normalize Hadolint SARIF automation IDs
        if: always()
        run: |
          jq '.runs[0].automationDetails.id = "docker-quality/hadolint-api"' hadolint-api.sarif > hadolint-api.tmp.sarif
          mv hadolint-api.tmp.sarif hadolint-api.sarif

          jq '.runs[0].automationDetails.id = "docker-quality/hadolint-frontend"' hadolint-frontend.sarif > hadolint-frontend.tmp.sarif
          mv hadolint-frontend.tmp.sarif hadolint-frontend.sarif

      - name: Upload Hadolint scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-api.sarif
          category: docker-quality/hadolint-api
        continue-on-error: true

      - name: Upload Hadolint frontend scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-frontend.sarif
          category: docker-quality/hadolint-frontend
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [python-quality, frontend-quality, security-scan, docker-quality]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [[ "${{ needs.python-quality.result }}" == "failure" || "${{ needs.frontend-quality.result }}" == "failure" ]]; then
            echo "Code quality checks failed!"
            exit 1
          fi
          echo "All quality checks passed!"